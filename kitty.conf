## General settings
term xterm-256color
scrollback_lines 100000
open_url_modifiers shift

## Look and feel
font_family Fira Mono for Powerline
italic_font Meslo LG L for Powerline, Italic
bold_font Fira Mono for Powerline, Bold
bold_italic_font Meslo LG L for Powerline, Bold Italic
font_size 12.0

# No borders
window_border_width 0
window_margin_width 0
# Disable blinking and bonking. Why would you do this!
cursor_blink_interval 0
visual_bell_duration 0
enable_audio_bell no
# fix mouse disappearing on macOS
macos_custom_beam_cursor yes

include theme.conf
